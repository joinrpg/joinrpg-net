name: Publish NuGet packages

on:
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  publish-nuget:
    name: Pack and publish ${{ matrix.project }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write  # 🔐 Для trusted publishing через OIDC
    strategy:
      matrix:
        project:
          - src/JoinRpg.Common.WebInfrastructure/JoinRpg.Common.WebInfrastructure.csproj
          # Добавить новые проекты сюда:
          # - src/SomeOtherProject/SomeOtherProject.csproj

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Git Version
        id: version
        run: iex ((New-Object System.Net.WebClient).DownloadString('https://raw.githubusercontent.com/AntonSmolkov/HandyPoshScripts/v1.0.2/DevOps/SemVerCalc_GitHubFlow_Actions.ps1'))
        shell: pwsh
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "Directory.Packages.props"

      - name: Restore
        run: dotnet restore

      - name: Pack
        run: >-
          dotnet pack ${{ matrix.project }}
          --no-restore
          -c Release
          -p:Version=${{ env.CALCULATED_VERSION }}
          -o ./nuget-output

      - name: Publish to NuGet.org (Trusted Publishing)
        uses: nuget/nuget-github-actions/publish@v1
        with:
          path-to-nupkg: ./nuget-output/*.nupkg
          skip-duplicate: true
